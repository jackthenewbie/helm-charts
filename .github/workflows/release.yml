name: Release Charts

on:
  push:
    branches:
      - main
      - velero-helm-charts-v*

permissions:
  contents: write
  packages: write ## needed for ghcr access

jobs:
  release:
    if: github.repository == 'jackthenewbie/helm-charts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 3.13.2

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.2.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Charts to GHCR
        run: |
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi

            helm push "${pkg}" oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts
          done

      # --- THEN THIS STEP RUNS, USING YOUR ORIGINAL SCRIPT ---
      - name: Delete existing GHCR velero version
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          CHART_VERSION=$(yq '.version' charts/velero/Chart.yaml)
          PKG_ENC="charts%2Fvelero"
        
          VERSION_ID=$(gh api "/users/${OWNER}/packages/container/${PKG_ENC}/versions?per_page=100" \
            --jq ".[] | select(.metadata.container.tags[]? == \"$CHART_VERSION\") | .id" \
            || true)
        
          if [ -n "${VERSION_ID:-}" ]; then
            # This will now target the OLD version, because the tag moved to the new one.
            # To be safe, let's delete all but the most recent.
            # Get a list of all version IDs with the target tag, sorted oldest-to-newest.
            VERSION_IDS_TO_DELETE=$(gh api "/users/${OWNER}/packages/container/${PKG_ENC}/versions?per_page=100" \
              --jq "[.[] | select(.metadata.container.tags[]? == \"$CHART_VERSION\")] | sort_by(.created_at) | .[:-1] | .[] | .id" \
              || true)

            for ID in $VERSION_IDS_TO_DELETE; do
              echo "Deleting old GHCR package version id=$ID for charts/velero:$CHART_VERSION"
              gh api -X DELETE "/users/${OWNER}/packages/container/${PKG_ENC}/versions/${ID}"
            done
          else
            echo "No old GHCR version found to clean up for charts/velero:$CHART_VERSION"
          fi