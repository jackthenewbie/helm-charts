name: Release Charts

on:
  push:
    branches:
      - main
      - velero-helm-charts-v*

permissions:
  contents: write
  packages: write ## needed for ghcr access

jobs:
  release:
    if: github.repository == 'jackthenewbie/helm-charts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 3.13.2

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Clean up old GHCR velero versions
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}   # PAT with delete:packages + read:packages
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          CHART_VERSION=$(yq '.version' charts/velero/Chart.yaml)
          PKG_ENC="charts%2Fvelero"

          VERSION_IDS_TO_DELETE=$(gh api "/users/${OWNER}/packages/container/${PKG_ENC}/versions?per_page=100" \
            --jq "[.[] | select(.metadata.container.tags[]? == \"$CHART_VERSION\")] | sort_by(.created_at) | .[:-1] | .[] | .id" \
            || true)

          if [ -n "${VERSION_IDS_TO_DELETE:-}" ]; then
            echo "Found old GHCR package versions to delete for charts/velero:$CHART_VERSION"

            for VERSION_ID in $VERSION_IDS_TO_DELETE; do
              echo "Deleting old GHCR package version id=$VERSION_ID"
              gh api -X DELETE "/users/${OWNER}/packages/container/${PKG_ENC}/versions/${VERSION_ID}"
            done
          else
            echo "No old GHCR package versions to clean up for charts/velero:$CHART_VERSION"
          fi





      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.2.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Charts to GHCR
        run: |
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi

            helm push "${pkg}" oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts
          done
