name: Release Charts

on:
  push:
    branches:
      - main
      - velero-helm-charts-v*

permissions:
  contents: write
  packages: write ## needed for ghcr access

jobs:
  release:
    if: github.repository == 'jackthenewbie/helm-charts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 3.13.2

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Delete existing GitHub Release
        run: |
          set -e
          CHART_VERSION=$(yq '.version' charts/velero/Chart.yaml)
          RELEASE_TAG="velero-$CHART_VERSION"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Deleting old GitHub release $RELEASE_TAG"
            gh release delete "$RELEASE_TAG" -y
          else
            echo "No GitHub release found for $RELEASE_TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing GHCR chart version
        run: |
          set -e
          CHART_NAME=$(yq '.name' charts/velero/Chart.yaml)
          CHART_VERSION=$(yq '.version' charts/velero/Chart.yaml)
          PACKAGE_NAME="charts/$CHART_NAME"
              
          OWNER_TYPE=$(gh api repos/${GITHUB_REPOSITORY} --jq .owner.type)
              
          if [ "$OWNER_TYPE" = "User" ]; then
            OWNER_PATH="users/${GITHUB_REPOSITORY_OWNER}"
          else
            OWNER_PATH="orgs/${GITHUB_REPOSITORY_OWNER}"
          fi
              
          VERSION_ID=$(gh api /$OWNER_PATH/packages/container/$PACKAGE_NAME/versions \
            --jq ".[] | select(.metadata.container.tags[]? == \"$CHART_VERSION\") | .id" || true)
              
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting old GHCR chart version $VERSION_ID"
            gh api -X DELETE /$OWNER_PATH/packages/container/$PACKAGE_NAME/versions/$VERSION_ID
          else
            echo "No GHCR version found for $CHART_NAME:$CHART_VERSION"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.2.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Charts to GHCR
        run: |
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi

            helm push "${pkg}" oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts
          done
