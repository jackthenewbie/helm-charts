name: Release Charts

on:
  push:
    branches:
      - main
      - velero-helm-charts-v*

permissions:
  contents: write
  packages: write ## needed for ghcr access

jobs:
  release:
    if: github.repository == 'jackthenewbie/helm-charts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 3.13.2

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      
      - name: Delete existing GitHub Release and Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHART_VERSION=$(yq '.version' charts/velero/Chart.yaml)
          RELEASE_TAG="velero-$CHART_VERSION"

          # First, delete the GitHub Release
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Deleting old GitHub release: $RELEASE_TAG"
            gh release delete "$RELEASE_TAG" --yes
          else
            echo "No GitHub release found for $RELEASE_TAG. Skipping."
          fi

          # Second, delete the underlying Git Tag from the remote
          if git ls-remote --tags origin | grep -q "refs/tags/$RELEASE_TAG"; then
            echo "Deleting old git tag from remote: $RELEASE_TAG"
            git push --delete origin "$RELEASE_TAG"
          else
            echo "No git tag found for $RELEASE_TAG. Skipping."
          fi

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.2.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Charts to GHCR
        run: |
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi

            helm push "${pkg}" oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts
          done
